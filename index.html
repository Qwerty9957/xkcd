<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XKCD Viewer</title>

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="shortcut icon" href="favicon.ico">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1115;
  color:#eee;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header{
  position:sticky;
  top:0;
  width:100%;
  padding:12px;
  background:#151922;
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}

button,input{
  background:#1f2633;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-size:15px;
}

button:hover{
  background:#2a3447;
  cursor:pointer;
}

input{
  width:90px;
  text-align:center;
}

#comicBox{
  padding:20px;
  text-align:center;
  max-width:900px;
}

img{
  max-width:100%;
  border-radius:12px;
  box-shadow:0 6px 25px rgba(0,0,0,.6);
}

#title{
  font-size:22px;
  margin-bottom:10px;
}

#alt{
  margin-top:14px;
  opacity:.8;
}
</style>
</head>
<body>

<header>
<button id="first">|&lt;</button>
<button id="prev">&lt;</button>

<input id="jump" type="number" min="1" placeholder="#">
<button id="go">Go</button>

<button id="rand">Random</button>

<button id="next">&gt;</button>
<button id="last">&gt;|</button>
</header>

<div id="comicBox">
<div id="title">Loading...</div>

<img id="img">

<div id="alt"></div>
</div>

<script>

const API="https://xkcd.vercel.app/?comic=";

let maxComic=0;
let current=1;

const img=document.getElementById("img");
const title=document.getElementById("title");
const alt=document.getElementById("alt");

async function fetchComic(num){

  let url = num
    ? API + num
    : "https://xkcd.vercel.app/?comic=latest";

  const r = await fetch(url);
  return await r.json();

}

async function show(num){

  if(num < 1) num = 1;
  if(maxComic && num > maxComic) num = maxComic;

  title.textContent="Loading...";

  const data = await fetchComic(num);

  current = data.num;

  title.textContent = data.num + " — " + data.title;

  img.src = data.img;

  alt.textContent = data.alt;

}

async function init(){

  const newest = await fetchComic();

  maxComic = newest.num;

  show(maxComic);

}

init();


document.getElementById("prev").onclick = () => show(current-1);

document.getElementById("next").onclick = () => show(current+1);

document.getElementById("first").onclick = () => show(1);

document.getElementById("last").onclick = () => show(maxComic);

document.getElementById("rand").onclick =
  () => show(Math.floor(Math.random()*maxComic)+1);

document.getElementById("go").onclick =
  () => show(Number(document.getElementById("jump").value));


// arrow keys

document.addEventListener("keydown", e=>{

  if(e.key==="ArrowLeft") show(current-1);

  if(e.key==="ArrowRight") show(current+1);

});

</script>

</body>
</html>
